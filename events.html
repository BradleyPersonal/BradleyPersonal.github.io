  <main>
    <h1>All upcoming events will be listed below:</h1>
    <body>
      <div id="myData"></div>
      <script>
          fetch('appendEvents.json')
              .then(function (response) {
                  return response.json();
              })
              .then(function (data) {
                  appendData(data);
              })
              .catch(function (err) {
                  console.log('error: ' + err);
              });
          function appendData(data) {
              var mainContainer = document.getElementById("myData");
              for (var i = 0; i < data.length; i++) {
                var title = document.createElement("h3");
                var event = document.createElement("div");
                var attendeeInfo = document.createElement("div");
                
                title.innerHTML = data[i].eventName;
                event.innerHTML = 'Track: ' + data[i].track + "<br />" + 'Vehicle: ' + data[i].car;
                attendeeInfo.innerHTML = 'Date: ' + data[i].fullDate + ', Racing Starts at ' + data[i].time + "<br />";

                mainContainer.appendChild(title);
                mainContainer.appendChild(event);
                mainContainer.appendChild(attendeeInfo);
              }
          }
      </script>
  </body>
